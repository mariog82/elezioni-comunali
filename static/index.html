<!doctype html>
<html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Comunali Barcellona P.G. - Rappresentanti</title><link rel="stylesheet" href="/style.css"></head>
<body><header><h1>Comunali Barcellona Pozzo di Gotto</h1><div>Rilevazione voti con liste in tab</div></header>
<main>
<section id="loginBox" class="card">
<h2>Accesso riservato</h2><div class="grid"><div><label>Telefono / codice</label><input id="phone" placeholder="3330000001 oppure admin"></div><div><label>PIN</label><input id="pin" type="password"></div></div>
<button onclick="login()">Accedi</button><p class="small">Demo: rappresentante <b>3330000001 / 1111</b>; admin <b>admin / 1234</b>.</p>
</section>
<section id="appBox" class="hidden">
<div class="card topbar"><div><b id="userName"></b><br><span id="userInfo" class="small"></span></div><div><button id="adminBtn" class="secondary hidden" onclick="location.href='/admin'">Pannello admin</button><button class="danger" onclick="logout()">Esci</button></div></div>
<section class="card"><h2>Dati sezione</h2><div class="grid"><div><label>Sezione</label><input id="section"></div><div><label>Note</label><input id="notes" placeholder="parziale, definitivo, ora aggiornamento..."></div></div></section>
<section class="card"><h2>Candidati sindaco</h2><div id="mayorList"></div></section>
<section class="card"><h2>Liste</h2><div id="tabs" class="tabs"></div><div id="listPanel"></div></section>
<section class="card"><h2>Messaggio e invio</h2><div class="actions"><button onclick="sendReport()">Invia al server centrale</button><button class="secondary" onclick="generateMessage()">Genera messaggio</button><button class="secondary" onclick="copyMessage()">Copia messaggio</button><button class="light" onclick="clearMessage()">Cancella box messaggio</button></div><textarea id="messageBox"></textarea></section>
</section></main><script src="/app.js"></script></body></html>
