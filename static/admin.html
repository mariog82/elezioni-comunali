<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Comunali BPG</title><link rel="stylesheet" href="/style.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><header><h1>Pannello amministratore</h1><div>Report centrale con tutte le liste</div></header><main><section class="card topbar"><button class="secondary" onclick="location.href='/'">Torna all'app</button><div><button onclick="loadDashboard()">Aggiorna</button><button class="secondary" onclick="location.href='/api/export.csv'">Esporta CSV</button></div></section><section class="grid"><div class="card"><h2>Sindaci</h2><canvas id="mayorChart"></canvas></div><div class="card"><h2>Liste</h2><canvas id="listChart"></canvas></div></section><section class="card"><h2>Sezioni ricevute</h2><div class="tablewrap"><table><thead><tr><th>Sezione</th><th>Rappresentante</th><th>Voti sindaco</th><th>Voti lista</th><th>Preferenze</th><th>Aggiornato</th></tr></thead><tbody id="sections"></tbody></table></div></section><section class="card"><h2>Preferenze per lista</h2><div id="prefTables"></div></section><section class="card"><h2>Utenti autorizzati</h2><div class="grid"><input id="newName" placeholder="Nome"><input id="newPhone" placeholder="Telefono/codice"><input id="newPin" placeholder="PIN"><input id="newSection" placeholder="Sezione"><select id="newRole"><option value="rappresentante">rappresentante</option><option value="admin">admin</option></select></div><button onclick="createUser()">Crea utente</button><div id="users"></div></section></main><script src="/admin.js"></script></body></html>
